name: Release Desktop

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 安装根项目依赖
        run: npm ci

      - name: 构建 Next standalone 并补全静态资源
        run: npm run build:standalone

      - name: 安装 Electron 依赖
        run: npm ci
        working-directory: desktop

      - name: 打包桌面绿色版
        run: npm run dist
        working-directory: desktop
        env:
          CZL_CLIENT_ID: ${{ secrets.CZL_CLIENT_ID }}

      - name: 压缩 win-unpacked 为 zip
        run: Compress-Archive -Path dist-desktop\win-unpacked\* -DestinationPath dist-desktop\CZL-Invoice-${{ github.ref_name }}-win-portable.zip
        shell: pwsh

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CZL 发票 ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: dist-desktop/CZL-Invoice-*-win-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
